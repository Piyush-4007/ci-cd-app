name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: echo "No tests defined"

      - name: Build Docker Image
        run: docker build -t ci-cd-app .

      - name: Push Docker Image
        run: |
          docker tag ci-cd-app piyush4007/ci-cd-app:latest
          docker push piyush4007/ci-cd-app:latest